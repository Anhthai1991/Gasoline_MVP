name: Auto Update PVOIL Prices

on:
  schedule:
    # Every 7 days at 08:00 UTC (15:00 Vietnam time)
    - cron: '0 8 */7 * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update script
        run: python update_pvoil_prices.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet pvoil_gasoline_prices_full.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add pvoil_gasoline_prices_full.csv
          git commit -m "Auto-update PVOIL fuel prices - $(date +'%Y-%m-%d %H:%M')"
          git push
